<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="La Tapatia Food Truck">
  <defs>
    <path id="lt-top" d="M120 32 a88 88 0 0 1 0 176" fill="none"/>
    <path id="lt-bottom" d="M32 120 a88 88 0 0 0 176 0" fill="none"/>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="120" cy="120" r="116" fill="#f9c823"/>
  <circle cx="120" cy="120" r="116" fill="none" stroke="#e0a800" stroke-width="2"/>
  <!-- dotted ring -->
  <circle cx="120" cy="120" r="104" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round"/>
  <!-- teal disc -->
  <circle cx="120" cy="120" r="98" fill="#1aa7a0"/>

  <!-- Curved brand text -->
  <text font-family="'Baloo 2', sans-serif" font-weight="800" letter-spacing="2" fill="#fff" font-size="22">
    <textPath href="#lt-top" startOffset="50%" text-anchor="middle">LA&#160;TAPATIA</textPath>
  </text>
  <text font-family="'Baloo 2', sans-serif" font-weight="800" letter-spacing="2" fill="#f9c823" font-size="20">
    <textPath href="#lt-bottom" startOffset="50%" text-anchor="middle">FOOD&#160;TRUCK</textPath>
  </text>

  <!-- Colorful fiesta "petals" fanned under the sombrero -->
  <g transform="translate(120 142)">
    <ellipse cx="0" cy="0" rx="56" ry="30" fill="#ec1e79"/>
    <ellipse cx="0" cy="-4" rx="44" ry="24" fill="#f0592b"/>
    <ellipse cx="0" cy="-7" rx="33" ry="19" fill="#f7901e"/>
    <ellipse cx="0" cy="-10" rx="22" ry="14" fill="#f9c823"/>
    <!-- little scallops -->
    <g fill="#7b4bc4">
      <circle cx="-46" cy="6" r="7"/><circle cx="-30" cy="13" r="7"/><circle cx="-12" cy="17" r="7"/>
      <circle cx="6" cy="17" r="7"/><circle cx="24" cy="13" r="7"/><circle cx="40" cy="6" r="7"/>
    </g>
  </g>

  <!-- Sombrero -->
  <g transform="translate(120 96)">
    <ellipse cx="0" cy="14" rx="50" ry="16" fill="#7a3b12"/>
    <ellipse cx="0" cy="11" rx="50" ry="14" fill="#a8551f"/>
    <path d="M-24 12 C-22 -18 22 -18 24 12 Z" fill="#c4691f"/>
    <ellipse cx="0" cy="12" rx="24" ry="7" fill="#8a4416"/>
    <!-- band -->
    <path d="M-22 6 C-10 11 10 11 22 6" fill="none" stroke="#ec1e79" stroke-width="4"/>
    <circle cx="0" cy="-10" r="6" fill="#f9c823"/>
  </g>
</svg>
