<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 160" role="img" aria-label="Guitar">
  <!-- neck -->
  <rect x="34" y="6" width="12" height="78" rx="3" fill="#7a3b12"/>
  <!-- headstock -->
  <rect x="30" y="2" width="20" height="16" rx="4" fill="#5c2c0c"/>
  <g fill="#f9c823"><circle cx="28" cy="8" r="2.5"/><circle cx="52" cy="8" r="2.5"/><circle cx="28" cy="14" r="2.5"/><circle cx="52" cy="14" r="2.5"/></g>
  <!-- body -->
  <path d="M40 70 C18 70 8 90 8 112 C8 138 24 156 40 156 C56 156 72 138 72 112 C72 90 62 70 40 70Z" fill="#f0592b"/>
  <path d="M40 70 C18 70 8 90 8 112 C8 138 24 156 40 156 C56 156 72 138 72 112 C72 90 62 70 40 70Z" fill="none" stroke="#c4451f" stroke-width="2"/>
  <!-- sound hole -->
  <circle cx="40" cy="104" r="13" fill="#7b4bc4"/>
  <circle cx="40" cy="104" r="13" fill="none" stroke="#f9c823" stroke-width="3"/>
  <!-- rosette flower -->
  <g transform="translate(40 104)" fill="#f9c823"><circle cx="0" cy="-18" r="3"/><circle cx="18" cy="0" r="3"/><circle cx="0" cy="18" r="3"/><circle cx="-18" cy="0" r="3"/></g>
  <!-- bridge -->
  <rect x="30" y="128" width="20" height="6" rx="2" fill="#7a3b12"/>
  <!-- strings -->
  <g stroke="#fde9a8" stroke-width="1"><path d="M36 18 V128"/><path d="M40 18 V128"/><path d="M44 18 V128"/></g>
  <!-- decorative dots -->
  <g fill="#1aa7a0"><circle cx="20" cy="92" r="3"/><circle cx="60" cy="92" r="3"/><circle cx="18" cy="124" r="3"/><circle cx="62" cy="124" r="3"/></g>
</svg>
