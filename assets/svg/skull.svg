  <path d="M36 100 Q60 116 84 100" fill="none" stroke="#7b4bc4" stroke-width="4"/>
  <g stroke="#7b4bc4" stroke-width="3"><path d="M44 102 v10"/><path d="M52 105 v9"/><path d="M60 106 v9"/><path d="M68 105 v9"/><path d="M76 102 v10"/></g>
