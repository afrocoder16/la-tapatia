<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" role="img" aria-label="Sugar skull">
  <!-- skull base -->
  <path d="M60 6 C26 6 12 32 12 58 C12 76 22 86 30 90 L30 104 C30 112 38 118 46 116 C50 122 56 124 60 124 C64 124 70 122 74 116 C82 118 90 112 90 104 L90 90 C98 86 108 76 108 58 C108 32 94 6 60 6Z" fill="#1aa7a0"/>
  <!-- forehead flower -->
  <g transform="translate(60 28)">
    <circle r="6" fill="#f9c823"/>
    <g fill="#ec1e79"><circle cx="0" cy="-11" r="5"/><circle cx="10" cy="-3" r="5"/><circle cx="6" cy="9" r="5"/><circle cx="-6" cy="9" r="5"/><circle cx="-10" cy="-3" r="5"/></g>
    <circle r="3" fill="#fff"/>
